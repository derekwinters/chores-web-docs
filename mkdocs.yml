site_name: Chores Documentation
site_description: REST API for managing household chores and tracking
repo_url: https://github.com/yourusername/chores-web
repo_name: chores-web
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      provider: github
      user: yourusername
      repo: chores-web
  - pymdownx.mark
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: en
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true

nav:
  - Home: index.md
  - API Reference:
    - Overview & Auth: api/index.md
    - Chores: api/chores.md
    - People: api/people.md
    - Points: api/points.md
    - Log: api/log.md
    - Themes: api/themes.md
    - Config & Health: api/config.md
  - Architecture: ARCHITECTURE.md
  - Developer Guide: DEVELOPER.md
  - Deployment: DEPLOYMENT.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername/chores-web
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com

copyright: Copyright &copy; 2024 Chores Contributors

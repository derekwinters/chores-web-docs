site_name: Chores Documentation
site_description: REST API for managing household chores and tracking
repo_url: https://github.com/derekwinters/chores-web
repo_name: chores-web
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      provider: github
      user: derekwinters
      repo: chores-web
  - pymdownx.mark
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: en
  - blog:
      blog_dir: blog
      post_url_format: "{slug}"
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true

nav:
  - Home: index.md
  - Blog: blog/index.md
  - User Guide:
    - Getting Started: user-guide/getting-started.md
    - Admin Features: user-guide/admin.md
    - Help & Troubleshooting: user-guide/help.md
  - API Reference:
    - Overview & Auth: api/index.md
    - Chores: api/chores.md
    - People: api/people.md
    - Points: api/points.md
    - Log: api/log.md
    - Themes: api/themes.md
    - Config & Health: api/config.md
    - Export: api/export.md
    - Import: api/import.md
  - Architecture:
    - Overview: architecture/overview.md
    - Features: architecture/features.md
    - Design: architecture/design.md
  - Developer Guide:
    - Setup & Workflow: developer/setup-and-workflow.md
    - Reference: developer/reference.md
    - Troubleshooting: developer/troubleshooting.md
  - Deployment:
    - Setup: deployment/setup.md
    - Operations: deployment/operations.md
    - Maintenance: deployment/maintenance.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/derekwinters/chores-web
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com

copyright: Copyright &copy; 2024 Chores Contributors
